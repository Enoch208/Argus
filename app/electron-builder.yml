appId: io.argus.desktop
productName: Argus
copyright: Copyright © 2026 Argus contributors

directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "package.json"

extraResources:
  - from: "resources/manifest.json"
    to: "manifest.json"
  - from: "resources/data/wallet-blacklist.jsonl"
    to: "data/wallet-blacklist.jsonl"

asarUnpack:
  - "**/*.{node,dll}"

mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.finance
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: false # toggle in CI when signing creds are wired

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish: null
