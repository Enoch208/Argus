appId: io.argus.desktop
productName: Argus
copyright: Copyright © 2026 Argus contributors

directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "package.json"

extraResources:
  - from: "resources/manifest.json"
    to: "manifest.json"
  - from: "resources/data/wallet-blacklist.jsonl"
    to: "data/wallet-blacklist.jsonl"

asarUnpack:
  - "**/*.{node,dll,dylib,so}"
  # The `@qvac/sdk` spawns the platform-specific Bare runtime binary as a
  # subprocess. The OS cannot exec files from inside an asar virtual fs, so
  # the binary directory must live as real files at `app.asar.unpacked/`.
  - "**/bare-runtime-*/**"
  # Once the Bare worker subprocess is running, it loads `worker.js` and
  # everything it transitively requires through Bare's own filesystem (not
  # Node's). Bare doesn't understand Electron's asar shim — it reads from
  # disk directly. Keeping all runtime node_modules outside the asar avoids
  # an endless chase of QVAC/Bare transitive packages (sodium-universal,
  # safety-catch, queue-tick, etc.) that otherwise make the worker start but
  # never complete its RPC handshake in the packaged app.
  - "node_modules/**"

mac:
  target:
    - target: dmg
      arch: [arm64]
  category: public.app-category.finance
  icon: resources/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: false # toggle in CI when signing creds are wired

dmg:
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

publish: null
